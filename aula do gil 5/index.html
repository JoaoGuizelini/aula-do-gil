<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div class="do-lado">
            <div class="a">
                <h1>SIMULADOR</h1>
                <p>Flexbox</p>
            </div>
            <div class="colors">
                <h2>cor</h2>
                <div class="conteiner2">
                    <div class="quad1">
                        <a href="#"><div class="cor" id="marom" onclick="setBgColor('brown')"></div></a>
                        <a href="#"><div class="cor" id="verde"onclick="setBgColor('green')"></div></a>
                    </div>
                    <div class="quad2">
                        <a href="#"><div class="cor" id="amarelo"onclick="setBgColor('yellow')"></div></a>
                        <a href="#"><div class="cor" id="azul"onclick="setBgColor('blue')"></div></a>
                    </div>
                    <div class="quad3">
                        <a href="#"><div class="cor" id="rosa" onclick="setBgColor('pink')"></div></a>
                        <a href="#"><div class="cor" id="vermelho" onclick="setBgColor('red')"></div></a>
                    </div>
                </div>
            </div>
                <div class="form">
                    <h2 id="txt-form">formato: </h2>
                    <a href="#"><div class="bola"></div></a>
                    <a href="#"><div class="quadrado"></div></a>
                </div>
            <div class="size-ct"> 
                <h2 id="txt-size">tamanho</h2>
                <input type="number" step="10" value="80" id="size">
            </div>
            <div>
                <h2>alinhamento</h2>
                <div>
                    <div>
                        <select name="flex-direction" id="fd">
                            <option value="row">flex-direction</option>
                            <option value="row">row</option>
                            <option value="row-reverse">row-reverse</option>
                            <option value="column">column</option>
                            <option value="column-reverse">column-reverse</option>
                        </select>
                    </div>
                    <div>
                        <select name="justify-content" id="jc">
                            <option value="flex-start">justify-content</option>
                            <option value="center">center</option>
                            <option value="flex-start">flex-start</option>
                            <option value="flex-end">flex-end</option>
                            <option value="space-between">space-between</option>
                            <option value="space-around">space-around</option>
                        </select>
                    </div>
                    <div>
                        <select name="align-itens" id="ai">
                            <option value="inherit">align-itens</option>
                            <option value="center">center</option>
                            <option value="inherit">inherit</option>
                            <option value="flex-start">flex-start</option>
                            <option value="flex-end">flex-end</option>
                            <option value="stretch">stretch</option>

                        </select>
                    </div>
                </div>
            </div>
        </div>
        <main id="main">
            <div class="box">1</div>
            <div class="box">2</div>
            <div class="box">3</div>
        </main>
    </div>
    <script src="back.js"></script>
</body>
</html>
